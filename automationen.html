<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HausKI – Automationen</title>
  <meta name="robots" content="noindex,nofollow" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    *{box-sizing:border-box}
    :root{
      --bg:#040911;
      --bg2:#0a1320;
      --card:rgba(11,22,37,0.85);
      --line:rgba(33,200,255,0.18);
      --text:#ecf6ff;
      --muted:#9db2c9;
      --accent:#21c8ff;
      --shadow:0 20px 60px rgba(0,0,0,0.35);
    }

    html{
      scroll-behavior:smooth;
    }

    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at 20% 10%, rgba(33,200,255,0.14), transparent 24%),
        radial-gradient(circle at 80% 0%, rgba(106,240,199,0.08), transparent 20%),
        linear-gradient(180deg,#050911 0%,#09111d 45%,#050911 100%);
      color:var(--text);
    }

    .container{
      width:min(1100px, calc(100% - 32px));
      margin:0 auto;
      padding:40px 0;
    }

    .hero{
      margin-bottom:24px;
      padding:26px;
      border-radius:22px;
      background:var(--card);
      border:1px solid var(--line);
      box-shadow:var(--shadow);
    }

    .eyebrow{
      display:inline-block;
      padding:8px 12px;
      border-radius:999px;
      background:rgba(33,200,255,0.08);
      border:1px solid rgba(33,200,255,0.18);
      color:var(--accent);
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:1px;
      margin-bottom:14px;
    }

    h1{
      margin:0 0 10px;
      font-size:clamp(28px,4vw,42px);
      line-height:1.08;
    }

    .lead{
      margin:0;
      color:var(--muted);
      line-height:1.7;
      max-width:70ch;
    }

    .status{
      margin-bottom:18px;
      padding:14px 16px;
      border-radius:14px;
      background:rgba(255,255,255,0.03);
      border:1px solid rgba(255,255,255,0.08);
      color:var(--muted);
    }

    .toolbar{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:18px;
    }

    .input{
      width:100%;
      min-height:48px;
      border-radius:14px;
      background:rgba(255,255,255,0.03);
      border:1px solid rgba(255,255,255,0.10);
      color:var(--text);
      padding:0 14px;
      outline:none;
    }

    .input:focus{
      border-color:rgba(33,200,255,0.45);
      box-shadow:0 0 0 3px rgba(33,200,255,0.08);
    }

    .list{
      display:grid;
      gap:16px;
    }

    .item{
      padding:18px;
      border-radius:18px;
      background:var(--card);
      border:1px solid var(--line);
      box-shadow:var(--shadow);
      scroll-margin-top:24px;
      transition:border-color 0.25s ease, box-shadow 0.25s ease, transform 0.25s ease;
    }

    .item:target{
      border-color:rgba(33,200,255,0.65);
      box-shadow:0 0 0 3px rgba(33,200,255,0.12), var(--shadow);
      transform:translateY(-2px);
    }

    .item.highlight{
      border-color:rgba(33,200,255,0.65);
      box-shadow:0 0 0 3px rgba(33,200,255,0.12), var(--shadow);
    }

    .item-head{
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:flex-start;
      margin-bottom:12px;
    }

    .item-head h2{
      margin:0;
      font-size:22px;
    }

    .meta{
      color:var(--muted);
      font-size:13px;
      margin-top:6px;
    }

    .chip{
      display:inline-flex;
      align-items:center;
      min-height:28px;
      padding:0 10px;
      border-radius:999px;
      background:rgba(33,200,255,0.08);
      border:1px solid rgba(33,200,255,0.15);
      color:var(--accent);
      font-size:12px;
      font-weight:700;
      white-space:nowrap;
    }

    pre{
      margin:0;
      padding:16px;
      border-radius:14px;
      background:rgba(4,11,20,0.92);
      border:1px solid rgba(255,255,255,0.08);
      color:#d7f0ff;
      overflow:auto;
      white-space:pre-wrap;
      word-break:break-word;
      font-family:Consolas, monospace;
      font-size:13px;
      line-height:1.7;
    }

    .empty{
      padding:18px;
      border-radius:18px;
      background:rgba(255,255,255,0.03);
      border:1px solid rgba(255,255,255,0.08);
      color:var(--muted);
    }

    @media (max-width:760px){
      .item-head{
        flex-direction:column;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <section class="hero">
      <span class="eyebrow">HausKI · Technische Seite</span>
      <h1>Automationen</h1>
      <p class="lead">
        Auf dieser Seite werden bearbeitete YAML-Automationen aus Supabase geladen.
        Ohne Bilder, ohne Zusatztext, nur die technische Version.
      </p>
    </section>

    <div id="status" class="status">Automationen werden geladen …</div>

    <div class="toolbar">
      <input id="search" class="input" type="search" placeholder="Automationen filtern …">
    </div>

    <section id="automationList" class="list"></section>
  </main>

  <script>
    const SUPABASE_URL = 'https://wuizcshgkdolkngqoutj.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_hHr-ZsPbx8vFZfOJ-mGARg_Atr7yIdI';
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const ui = {
      status: document.getElementById('status'),
      search: document.getElementById('search'),
      list: document.getElementById('automationList')
    };

    let automations = [];

    ui.search.addEventListener('input', renderAutomations);

    loadAutomations();

    async function loadAutomations(){
      ui.status.textContent = 'Automationen werden geladen …';

      const { data, error } = await supabaseClient
        .from('automationen')
        .select('*')
        .order('created_at', { ascending: false });

      if(error){
        ui.status.textContent = `Fehler beim Laden: ${error.message}`;
        ui.list.innerHTML = '<div class="empty">Es konnten keine Automationen geladen werden.</div>';
        return;
      }

      automations = data || [];

      if(!automations.length){
        ui.status.textContent = 'Noch keine Automationen gespeichert.';
        ui.list.innerHTML = '<div class="empty">Noch keine Einträge vorhanden.</div>';
        return;
      }

      ui.status.textContent = `${automations.length} Automation(en) geladen.`;
      renderAutomations();

      requestAnimationFrame(() => {
        highlightHashTarget();
      });
    }

    function renderAutomations(){
      const term = ui.search.value.trim().toLowerCase();

      const filtered = automations.filter(item => {
        if(!term) return true;
        return [item.title, item.id, item.yaml_code].join(' ').toLowerCase().includes(term);
      });

      if(!filtered.length){
        ui.list.innerHTML = '<div class="empty">Keine passenden Automationen gefunden.</div>';
        return;
      }

      ui.list.innerHTML = filtered.map(item => `
        <article class="item" id="${escapeHtml(item.id || '')}">
          <div class="item-head">
            <div>
              <h2>${escapeHtml(item.title || 'Ohne Titel')}</h2>
              <div class="meta">
                ID: ${escapeHtml(item.id || '')}
                ${item.created_at ? ` · ${new Date(item.created_at).toLocaleString('de-AT')}` : ''}
              </div>
            </div>
            <span class="chip">YAML</span>
          </div>

          <pre>${escapeHtml(item.yaml_code || '')}</pre>
        </article>
      `).join('');
    }

    function highlightHashTarget(){
      const hash = decodeURIComponent(window.location.hash || '').replace('#', '').trim();
      if(!hash) return;

      const target = document.getElementById(hash);
      if(!target) return;

      target.classList.add('highlight');

      setTimeout(() => {
        target.classList.remove('highlight');
      }, 2500);
    }

    window.addEventListener('hashchange', highlightHashTarget);

    function escapeHtml(value){
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }
  </script>
</body>
</html>
