<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HausKI Admin</title>
  <link rel="icon" type="image/png" href="bilder/New_Home_Assistant_logo.svg.png">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 40px 20px;
      font-family: Arial, Helvetica, sans-serif;
      background: #081320;
      color: #ffffff;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 30px;
      font-size: 2rem;
    }

    form {
      background: #0f1f33;
      padding: 30px;
      border-radius: 12px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
    }

    input,
    textarea,
    select {
      width: 100%;
      padding: 12px;
      margin-bottom: 18px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
    }

    textarea {
      min-height: 110px;
      resize: vertical;
    }

    input[type="file"] {
      background: #ffffff;
      color: #081320;
      cursor: pointer;
    }

    button {
      background: #21c8ff;
      color: #081320;
      border: none;
      padding: 12px 20px;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s ease;
    }

    button:hover {
      opacity: 0.92;
    }

    #message {
      margin-top: 18px;
    }

    .success {
      color: #6af0c7;
      font-weight: 600;
    }

    .error {
      color: #ff6b6b;
      font-weight: 600;
    }

    .image-preview-wrap {
      margin: -6px 0 18px;
    }

    .image-preview {
      display: none;
      width: 100%;
      max-width: 420px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 10px 25px rgba(0,0,0,0.35);
    }

    .hint {
      font-size: 13px;
      color: #a9bfd3;
      margin-top: -10px;
      margin-bottom: 18px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>HausKI Blog Admin</h1>

    <form id="post-form">
      <label for="title">Titel</label>
      <input id="title" type="text" required>

      <label for="excerpt">Auszug</label>
      <textarea id="excerpt"></textarea>

      <label for="content">Inhalt</label>
      <textarea id="content"></textarea>

      <label for="post_type">Post Typ</label>
      <select id="post_type">
        <option value="linkedin">LinkedIn</option>
        <option value="blog" selected>Blog</option>
      </select>

      <label for="linkedin_url">LinkedIn URL</label>
      <input id="linkedin_url" type="url">

      <label for="cover_image">Cover Bild</label>
      <input id="cover_image" type="file" accept="image/*">
      <div class="hint">Bild auswählen, Vorschau kontrollieren, dann speichern.</div>

      <div class="image-preview-wrap">
        <img id="image_preview" class="image-preview" alt="Bildvorschau">
      </div>

      <label for="published_at">Veröffentlicht am</label>
      <input id="published_at" type="date">

      <label for="visible">Sichtbar</label>
      <select id="visible">
        <option value="true">Ja</option>
        <option value="false">Nein</option>
      </select>

      <button type="submit">Beitrag speichern</button>

      <div id="message"></div>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <script>
    const SUPABASE_URL = "https://wuizcshgkdolkngqoutj.supabase.co";
    const SUPABASE_KEY = "sb_publishable_hHr-ZsPbx8vFZfOJ-mGARg_Atr7yIdI";
    const STORAGE_BUCKET = "blog-images";

    const adminSupabase = window.supabase.createClient(
      SUPABASE_URL,
      SUPABASE_KEY
    );

    const form = document.getElementById("post-form");
    const message = document.getElementById("message");
    const coverImageInput = document.getElementById("cover_image");
    const imagePreview = document.getElementById("image_preview");

    coverImageInput.addEventListener("change", () => {
      const file = coverImageInput.files[0];

      if (!file) {
        imagePreview.style.display = "none";
        imagePreview.src = "";
        return;
      }

      const localUrl = URL.createObjectURL(file);
      imagePreview.src = localUrl;
      imagePreview.style.display = "block";
    });

    async function uploadCoverImage(file) {
      if (!file) return "";

      const fileExt = file.name.split(".").pop();
      const safeName = file.name
        .replace(/\.[^/.]+$/, "")
        .replace(/[^a-zA-Z0-9-_]/g, "-")
        .toLowerCase();

      const fileName = `${Date.now()}-${safeName}.${fileExt}`;
      const filePath = `covers/${fileName}`;

      const { error: uploadError } = await adminSupabase.storage
        .from(STORAGE_BUCKET)
        .upload(filePath, file, {
          cacheControl: "3600",
          upsert: false
        });

      if (uploadError) {
        throw uploadError;
      }

      const { data } = adminSupabase.storage
        .from(STORAGE_BUCKET)
        .getPublicUrl(filePath);

      return data.publicUrl;
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      message.innerHTML = "";

      const submitButton = form.querySelector("button[type='submit']");
      submitButton.disabled = true;
      submitButton.textContent = "Speichert...";

      try {
        const publishedDate = document.getElementById("published_at").value;
        const selectedFile = coverImageInput.files[0];

        let coverImageUrl = "";
        if (selectedFile) {
          coverImageUrl = await uploadCoverImage(selectedFile);
        }

        const post = {
          title: document.getElementById("title").value.trim(),
          excerpt: document.getElementById("excerpt").value.trim(),
          content: document.getElementById("content").value.trim(),
          post_type: document.getElementById("post_type").value,
          linkedin_url: document.getElementById("linkedin_url").value.trim(),
          cover_image: coverImageUrl,
          published_at: publishedDate ? `${publishedDate}T12:00:00` : null,
          visible: document.getElementById("visible").value === "true"
        };

        const { error } = await adminSupabase
          .from("posts")
          .insert([post]);

        if (error) {
          throw error;
        }

        message.innerHTML = "<div class='success'>Beitrag erfolgreich gespeichert.</div>";
        form.reset();
        imagePreview.src = "";
        imagePreview.style.display = "none";
      } catch (error) {
        console.error("Fehler beim Speichern:", error);
        message.innerHTML = "<div class='error'>Fehler beim Speichern des Beitrags oder beim Bild-Upload.</div>";
      } finally {
        submitButton.disabled = false;
        submitButton.textContent = "Beitrag speichern";
      }
    });
  </script>
</body>
</html>
