<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HausKI Admin</title>
  <link rel="icon" type="image/png" href="bilder/New_Home_Assistant_logo.svg.png">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 40px 20px;
      font-family: Arial, Helvetica, sans-serif;
      background: #081320;
      color: #ffffff;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 30px;
      font-size: 2rem;
    }

    form {
      background: #0f1f33;
      padding: 30px;
      border-radius: 12px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
    }

    input,
    textarea,
    select {
      width: 100%;
      padding: 12px;
      margin-bottom: 18px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
    }

    textarea {
      min-height: 110px;
      resize: vertical;
    }

    button {
      background: #21c8ff;
      color: #081320;
      border: none;
      padding: 12px 20px;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s ease;
    }

    button:hover {
      opacity: 0.92;
    }

    #message {
      margin-top: 18px;
    }

    .success {
      color: #6af0c7;
      font-weight: 600;
    }

    .error {
      color: #ff6b6b;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>HausKI Blog Admin</h1>

    <form id="post-form">
      <label for="title">Titel</label>
      <input id="title" type="text" required>

      <label for="excerpt">Auszug</label>
      <textarea id="excerpt"></textarea>

      <label for="content">Inhalt</label>
      <textarea id="content"></textarea>

      <label for="post_type">Post Typ</label>
      <select id="post_type">
        <option value="linkedin">LinkedIn</option>
        <option value="blog">Blog</option>
      </select>

      <label for="linkedin_url">LinkedIn URL</label>
      <input id="linkedin_url" type="url">

      <label for="cover_image">Cover Bild</label>
      <input id="cover_image" type="text">

      <label for="published_at">Veröffentlicht am</label>
      <input id="published_at" type="date">

      <label for="visible">Sichtbar</label>
      <select id="visible">
        <option value="true">Ja</option>
        <option value="false">Nein</option>
      </select>

      <button type="submit">Beitrag speichern</button>

      <div id="message"></div>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <script>
    const SUPABASE_URL = "https://wuizcshgkdolkngqoutj.supabase.co";
    const SUPABASE_KEY = "sb_publishable_hHr-ZsPbx8vFZfOJ-mGARg_Atr7yIdI";

    const adminSupabase = window.supabase.createClient(
      SUPABASE_URL,
      SUPABASE_KEY
    );

    const form = document.getElementById("post-form");
    const message = document.getElementById("message");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      message.innerHTML = "";

      const publishedDate = document.getElementById("published_at").value;

      const post = {
        title: document.getElementById("title").value.trim(),
        excerpt: document.getElementById("excerpt").value.trim(),
        content: document.getElementById("content").value.trim(),
        post_type: document.getElementById("post_type").value,
        linkedin_url: document.getElementById("linkedin_url").value.trim(),
        cover_image: document.getElementById("cover_image").value.trim(),
        published_at: publishedDate ? `${publishedDate}T12:00:00` : null,
        visible: document.getElementById("visible").value === "true"
      };

      const { error } = await adminSupabase
        .from("posts")
        .insert([post]);

      if (error) {
        message.innerHTML = "<div class='error'>Fehler beim Speichern des Beitrags.</div>";
        console.error("Fehler beim Speichern:", error);
        return;
      }

      message.innerHTML = "<div class='success'>Beitrag erfolgreich gespeichert.</div>";
      form.reset();
    });
  </script>
</body>
</html>
